# sonar-project.properties
sonar.projectKey=python-project-52
sonar.sources=task_manager
sonar.tests=task_manager/tests.py
sonar.python.coverage.reportPaths=coverage.xml
sonar.exclusions=**/migrations/**,**/tests.py,**/test_*.py

# Игнорировать предупреждения о жестко закодированных паролях в тестах
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/tests.py

