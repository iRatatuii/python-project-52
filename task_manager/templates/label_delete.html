{% extends "base.html" %}

{% block content %}
<div class="container wrapper flex-grow-1">
    <h1 class="my-4">Удаление метки</h1>

    <p>Вы уверены, что хотите удалить {{ label.name }}?</p>

    <form method="post">
        {% csrf_token %}
        <input class="btn btn-danger" type="submit" value="Да, удалить">
        <a href="/labels/" class="btn btn-secondary">Нет, отмена</a>
    </form>
</div>
{% endblock %}
