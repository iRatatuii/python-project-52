{% extends "base.html" %}

{% block content %}
<div class="container wrapper flex-grow-1">
    <h1 class="my-4">Удаление задачи</h1>

    <p>Вы уверены, что хотите удалить {{ task.name }}?</p>

    <form method="post">
        {% csrf_token %}
        <input class="btn btn-danger" type="submit" value="Да, удалить">
        <a href="/tasks/" class="btn btn-secondary">Нет, отмена</a>
    </form>
</div>
{% endblock %}
